databases:
  - name: grabpic-db
    plan: free
    postgresMajorVersion: 16

services:
  - type: web
    name: grabpic-api
    runtime: docker
    plan: free
    healthCheckPath: /healthz
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: grabpic-db
          property: connectionString
      - key: STORAGE_DIR
        value: /tmp/grabpic/storage
      - key: MATCH_THRESHOLD
        value: "0.92"
      - key: MAX_UPLOAD_MB
        value: "8"
      - key: FRONTEND_ORIGIN
        sync: false
