databases:
  - name: grabpic-db
    plan: basic-256mb
    postgresMajorVersion: 16

services:
  - type: web
    name: grabpic-api
    runtime: docker
    plan: starter
    healthCheckPath: /healthz
    disk:
      name: grabpic-data
      mountPath: /data
      sizeGB: 1
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: grabpic-db
          property: connectionString
      - key: STORAGE_DIR
        value: /data/storage/raw
      - key: DEEPFACE_HOME
        value: /data/.deepface
      - key: MATCH_THRESHOLD
        value: "0.55"
      - key: MAX_UPLOAD_MB
        value: "8"
      - key: FRONTEND_ORIGIN
        sync: false
